nav ul{

.container{

margin:120px auto 50px;

}

<body>

<nav>

<ul>

<div class="container">

<h1>Password Generator</h1>

<div class="output">

<input
type="text"
id="password"
readonly>

<button onclick="copyPassword()">
Copy
</button>

</div>

<div class="option">

<label>
Password Length:
<span id="lengthValue">12</span>
</label>

<input
class="range"
type="range"
min="8"
max="32"
value="12"
id="length"
oninput="updateLength()">

</div>

<div class="option">

<label>
<input type="checkbox" id="upper" checked>
 Uppercase Letters
</label>

<label>
<input type="checkbox" id="lower" checked>
 Lowercase Letters
</label>

<label>
<input type="checkbox" id="number" checked>
 Numbers
</label>

<label>
<input type="checkbox" id="symbol" checked>
 Symbols
</label>

</div>

<br>

<button onclick="generatePassword()">
Generate Secure Password
</button>

<div class="info">

<h3>Cyber Security Tip</h3>

<p>
A strong password should contain uppercase letters,
lowercase letters, numbers and symbols.
</p>

</div>

</div>

<footer>
CyberShield Internship Project © 2026
</footer>

<script>

function updateLength(){

document.getElementById("lengthValue").innerText =
document.getElementById("length").value;

}

function generatePassword(){

let chars = "";

if(document.getElementById("upper").checked)
chars += "ABCDEFGHIJKLMNOPQRSTUVWXYZ";

if(document.getElementById("lower").checked)
chars += "abcdefghijklmnopqrstuvwxyz";

if(document.getElementById("number").checked)
chars += "0123456789";

if(document.getElementById("symbol").checked)
chars += "@#$%&*!?";

if(chars===""){

alert("Select at least one option");
return;

}

let length =
document.getElementById("length").value;

let password = "";

for(let i=0;i<length;i++){

password += chars.charAt(
Math.floor(Math.random()*chars.length)
);

}

document.getElementById("password").value =
password;

}

function copyPassword(){

let pass =
document.getElementById("password");

navigator.clipboard.writeText(pass.value);

alert("Password Copied");

}

generatePassword();

</script>

</body>
